<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>My Protfolio QR code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main__section">

    <h2 class="title">My Protfolio</h2>

    <picture class="image__container">
        <img class="image" src="./images/My_portfolio_website-1024.png" alt="QR code linking to Frontend Mentor">
    </picture>

    <section class="content__container">
        <p class="description">Scan to view my portfolio</p>
        <a class="portfolio__link" href="https://honor-mb.github.io/PORTFOLIO/">View portfolio</a>
    </section>

  </main>
</body>
</html>
